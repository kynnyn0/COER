  </head>

  <style>
    /* 1. 로고를 감싸는 상자 크기 조절 (10px은 너무 작으니 40px 정도로 키웁니다) */
    .logo {
      height: 100px; /* 💡 원하는 로고 높이로 숫자를 조절해 보세요 */
      display: flex;
      align-items: center;
    }

    /* 2. 로고 안에 있는 링크 태그 스타일 */
    .logo a {
      display: inline-block;
      height: 100%; /* 부모 상자 높이를 그대로 따라감 */
    }

    /* 💥 3. 핵심: 이미지 태그가 부모 상자 크기를 벗어나지 못하도록 락을 겁니다 */
    .logo img {
      height: 100%; /* 부모 높이에 맞게 이미지 축소/확대 */
      width: auto; /* 가로 비율은 깨지지 않게 알아서 맞춤 */
      object-fit: contain; /* 이미지가 찌그러지지 않고 예쁘게 들어가도록 방지 */
    }
    /* 두 버튼을 감싸는 상자를 오른쪽 끝으로 밀고, 버튼 사이 간격을 좁힙니다 */
    .auth-group {
      margin-left: auto; /* 💡 왼쪽 여백을 최대로 밀어서 오른쪽 끝으로 이동시킴 */
      display: flex;
      gap: 10px; /* 💡 두 버튼 사이의 간격을 10px로 가깝게 설정 */
      align-items: center;
    }

    .gallery-container {
      max-width: 1400px;
      margin: 150px auto 80px auto !important;
      padding: 0 40px;
    }

    .gallery-title {
      font-family: "Montserrat", sans-serif;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      margin-bottom: 40px;
      color: #2d3748;
    }

    /* 🔘 1. 동그란 라디오 버튼 자체는 화면에서 보이지 않게 숨깁니다 */
    input[type="radio"] {
      display: none;
    }

    /* 🏷️ 2. 버튼처럼 꾸민 라벨(Label) 디자인 */
    .filter-tags {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .tag-label {
      background-color: #f7fafc;
      color: #4a5568;
      border: 1px solid #e2e8f0;
      padding: 8px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    .tag-label:hover {
      background-color: #e2e8f0;
    }

    /* 🎯 3. [핵심 치트키] 라디오 버튼이 체크되면 연결된 라벨을 활성화 색상으로 변경 */
    #btn-all:checked ~ .filter-tags [for="btn-all"],
    #btn-martin:checked ~ .filter-tags [for="btn-martin"],
    #btn-james:checked ~ .filter-tags [for="btn-james"],
    #btn-juhoon:checked ~ .filter-tags [for="btn-juhoon"],
    #btn-seonghyeon:checked ~ .filter-tags [for="btn-seonghyeon"],
    #btn-keonho:checked ~ .filter-tags [for="btn-keonho"] {
      background-color: #2d3748 !important;
      color: white !important;
      border-color: #2d3748 !important;
    }

    /* 📸 4. 사진 Grid 레이아웃 */
    .image-grid {
      display: grid !important;
      grid-template-columns: repeat(5, 1fr) !important;
      gap: 15px !important;
    }

    .image-item {
      position: relative !important; /* 💥 하트 버튼의 기준점이 되도록 설정 */
      border-radius: 8px !important;
      overflow: hidden !important;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.04);
      transition: transform 0.3s ease;
    }

    .image-item img {
      width: 100% !important;
      height: 220px !important;
      object-fit: cover !important;
      display: block;
    }

    .image-item:hover {
      transform: translateY(-3px);
    }

    /* 💥 5. [필터링 시스템] 마틴을 누르면 마틴 클래스가 아닌 사진들을 전부 display: none 시켜버림 */
    #btn-martin:checked ~ .image-grid .image-item:not(.martin),
    #btn-james:checked ~ .image-grid .image-item:not(.james),
    #btn-juhoon:checked ~ .image-grid .image-item:not(.juhoon),
    #btn-seonghyeon:checked ~ .image-grid .image-item:not(.seonghyeon),
    #btn-keonho:checked ~ .image-grid .image-item:not(.keonho) {
      display: none !important;
    }

    /* ==========================================================================
   📱 반응형 화면 조절
   ========================================================================== */
    @media (max-width: 1024px) {
      .image-grid {
        grid-template-columns: repeat(3, 1fr) !important;
      }
    }
    @media (max-width: 768px) {
      .image-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }
  </style>
